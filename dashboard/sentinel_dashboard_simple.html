<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sentinel Dashboard — SOC Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #060910;
      --surface: #0c1320;
      --border:  #182436;
      --text:    #c8d6e8;
      --muted:   #3d5470;
      --accent:  #ff4d6d;
      --blue:    #00d4ff;
      --green:   #00e676;
      --yellow:  #ffd166;
      --orange:  #ff8c42;
      --red:     #ff4d6d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 28px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(255,77,109,0.012) 2px, rgba(255,77,109,0.012) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    .wrap { max-width: 1400px; margin: 0 auto; }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .header-left h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.5px; color: #fff; }
    .header-left h1 span { color: var(--accent); }
    .header-left p { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); margin-top: 6px; }

    .badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 700;
      padding: 8px 16px;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 4px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }

    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .kpi::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      opacity: 0.4;
    }

    .kpi.blue::after   { background: var(--blue); }
    .kpi.green::after  { background: var(--green); }
    .kpi.orange::after { background: var(--orange); }

    .kpi-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
    .kpi-value { font-size: 42px; font-weight: 800; color: #fff; line-height: 1; }
    .kpi.red    .kpi-value { color: var(--red); }
    .kpi.blue   .kpi-value { color: var(--blue); }
    .kpi.green  .kpi-value { color: var(--green); }
    .kpi.orange .kpi-value { color: var(--orange); }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }

    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }

    .panel-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel-title::before { content: '//'; color: var(--muted); }

    .chart-container { position: relative; width: 100%; height: 240px; }

    .bar-list { display: flex; flex-direction: column; gap: 10px; }
    .bar-item { display: flex; flex-direction: column; gap: 4px; }
    .bar-label { display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text); }
    .bar-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 2px; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    td { padding: 10px 12px; border-bottom: 1px solid rgba(24,36,54,0.5); font-family: 'JetBrains Mono', monospace; font-size: 12px; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,77,109,0.03); }

    .sev { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.06em; }
    .sev-critical { background: rgba(255,77,109,0.15); color: var(--red);    border: 1px solid rgba(255,77,109,0.3); }
    .sev-high     { background: rgba(255,140,66,0.15); color: var(--orange); border: 1px solid rgba(255,140,66,0.3); }
    .sev-medium   { background: rgba(255,209,102,0.15);color: var(--yellow); border: 1px solid rgba(255,209,102,0.3);}
    .sev-low      { background: rgba(0,230,118,0.10);  color: var(--green);  border: 1px solid rgba(0,230,118,0.2); }
    .sev-info     { background: rgba(0,212,255,0.10);  color: var(--blue);   border: 1px solid rgba(0,212,255,0.2); }

    .status-active   { color: var(--red); }
    .status-resolved { color: var(--green); }
    .empty { color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 12px; }
    .foot { text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); padding: 20px 0 4px; }

    @media (max-width: 900px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .two-col  { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="header-left">
      <h1>SENTINEL<span>ONE</span> DASHBOARD</h1>
      <p id="ts">SOC Platform — cargando...</p>
    </div>
    <div class="badge">Leviathan SOC</div>
  </div>

  <div class="kpi-grid" id="kpis"></div>

  <!-- Gráfica de incidentes en el tiempo -->
  <div class="panel">
    <div class="panel-title">Incidentes en el tiempo</div>
    <div class="chart-container">
      <canvas id="timelineChart"></canvas>
    </div>
  </div>

  <div class="two-col">
    <div class="panel">
      <div class="panel-title">Clasificación de amenazas</div>
      <div class="bar-list" id="class-bars"></div>
    </div>
    <div class="panel">
      <div class="panel-title">Estado de incidentes</div>
      <div class="bar-list" id="status-bars"></div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">Top endpoints afectados</div>
    <div class="bar-list" id="endpoint-bars"></div>
  </div>

  <div class="panel">
    <div class="panel-title">Incidentes recientes</div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Fecha</th><th>Endpoint</th><th>Amenaza</th>
          <th>Clasificación</th><th>Severidad</th><th>Estado</th><th>Usuario</th>
        </tr></thead>
        <tbody id="incidents-body"></tbody>
      </table>
    </div>
  </div>

  <div class="foot">SOC Platform · SentinelOne Dashboard · auto-refresh cada 30s</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const JSON_URL   = 'sentinel_dashboard_data.json';
const REFRESH_MS = 30000;
let timelineChart = null;

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function sevClass(s) {
  const m = { critical:'sev-critical', high:'sev-high', medium:'sev-medium', low:'sev-low' };
  return m[(s||'').toLowerCase()] || 'sev-info';
}

function renderBars(containerId, items, keyField, valField, color) {
  const el = document.getElementById(containerId);
  if (!items || !items.length) { el.innerHTML = '<span class="empty">Sin datos</span>'; return; }
  const max = Math.max(...items.map(i => i[valField]));
  el.innerHTML = items.slice(0, 10).map(item => `
    <div class="bar-item">
      <div class="bar-label"><span>${esc(String(item[keyField]))}</span><span>${item[valField]}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(item[valField]/max*100)}%;background:${color}"></div></div>
    </div>
  `).join('');
}

function renderTimeline(timeline) {
  if (!timeline || !timeline.length) return;

  const labels = timeline.map(d => d.date);
  const values = timeline.map(d => d.count);
  const ctx    = document.getElementById('timelineChart').getContext('2d');

  if (timelineChart) {
    timelineChart.data.labels          = labels;
    timelineChart.data.datasets[0].data = values;
    timelineChart.update('none');
    return;
  }

  timelineChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Incidentes',
        data: values,
        borderColor: '#ff4d6d',
        backgroundColor: 'rgba(255,77,109,0.07)',
        borderWidth: 2,
        pointBackgroundColor: '#ff4d6d',
        pointBorderColor: '#060910',
        pointBorderWidth: 2,
        pointRadius: 4,
        pointHoverRadius: 7,
        fill: true,
        tension: 0.35,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#0c1320',
          borderColor: '#182436',
          borderWidth: 1,
          titleColor: '#c8d6e8',
          bodyColor: '#ff4d6d',
          titleFont: { family: 'JetBrains Mono', size: 11 },
          bodyFont:  { family: 'JetBrains Mono', size: 12 },
          padding: 10,
          callbacks: {
            title: ctx => ctx[0].label,
            label: ctx => `  incidentes: ${ctx.parsed.y}`,
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#3d5470', font: { family: 'JetBrains Mono', size: 10 }, maxTicksLimit: 14, maxRotation: 45 },
          grid: { color: 'rgba(24,36,54,0.6)' },
          border: { color: '#182436' },
        },
        y: {
          ticks: { color: '#3d5470', font: { family: 'JetBrains Mono', size: 10 } },
          grid: { color: 'rgba(24,36,54,0.6)' },
          border: { color: '#182436' },
          beginAtZero: true,
        }
      }
    }
  });
}

async function loadData() {
  try {
    const res  = await fetch(JSON_URL + '?t=' + Date.now());
    const data = await res.json();
    render(data);
  } catch(e) {
    console.error('Error:', e);
  }
}

function render(data) {
  const s = data.summary || {};
  document.getElementById('ts').textContent = `Último reporte: ${data.generated_at || '—'}`;

  const kpis = [
    { label: 'Total incidentes', value: s.total_incidents    || 0, cls: '' },
    { label: 'Activos',          value: s.active_incidents   || 0, cls: 'red' },
    { label: 'Resueltos',        value: s.resolved_incidents || 0, cls: 'green' },
    { label: 'Endpoints',        value: s.monitored_endpoints|| 0, cls: 'blue' },
  ];

  document.getElementById('kpis').innerHTML = kpis.map(k => `
    <div class="kpi ${k.cls}">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.value.toLocaleString()}</div>
    </div>
  `).join('');

  renderTimeline(data.incidents_over_time || []);
  renderBars('class-bars',    data.classification_counts || [], 'classification', 'count', 'var(--accent)');
  renderBars('status-bars',   data.status_counts         || [], 'status',         'count', 'var(--blue)');
  renderBars('endpoint-bars', data.top_endpoints         || [], 'agent_name',     'count', 'var(--orange)');

  const body      = document.getElementById('incidents-body');
  const incidents = data.recent_incidents || [];
  if (!incidents.length) {
    body.innerHTML = '<tr><td colspan="7" class="empty">Sin incidentes recientes</td></tr>';
  } else {
    body.innerHTML = incidents.map(i => `
      <tr>
        <td>${esc(i.created_at)}</td>
        <td>${esc(i.endpoint)}</td>
        <td>${esc(i.threat)}</td>
        <td>${esc(i.classification)}</td>
        <td><span class="sev ${sevClass(i.severity)}">${esc(i.severity)}</span></td>
        <td class="${i.status?.toLowerCase()==='resolved'?'status-resolved':'status-active'}">${esc(i.status)}</td>
        <td>${esc(i.username)}</td>
      </tr>
    `).join('');
  }
}

loadData();
setInterval(loadData, REFRESH_MS);
</script>
</body>
</html>
