<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sentinel SOC Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
        background:#0f172a;
        color:#e5e7eb;
        font-family:Arial, Helvetica, sans-serif;
        margin:0;
        padding:0;
    }

    header {
        background:#020617;
        padding:20px;
        border-bottom:1px solid #1e293b;
    }

    h1 {
        margin:0;
        color:#38bdf8;
    }

    .container {
        padding:20px;
    }

    .kpis {
        display:grid;
        grid-template-columns: repeat(4,1fr);
        gap:20px;
        margin-bottom:30px;
    }

    .kpi {
        background:#020617;
        padding:20px;
        border-radius:8px;
        text-align:center;
    }

    .kpi h2 {
        margin:0;
        font-size:32px;
    }

    .kpi p {
        margin:5px 0 0 0;
        color:#94a3b8;
    }

    .charts {
        display:grid;
        grid-template-columns: repeat(2,1fr);
        gap:30px;
    }

    .chart-box {
        background:#020617;
        padding:20px;
        border-radius:8px;
    }

    table {
        width:100%;
        border-collapse:collapse;
        margin-top:30px;
    }

    th, td {
        padding:10px;
        border-bottom:1px solid #1e293b;
    }

    th {
        text-align:left;
        color:#38bdf8;
    }

    tr:hover {
        background:#1e293b;
    }

    .footer {
        margin-top:20px;
        color:#64748b;
    }
  </style>

</head>
<body>

<header>
  <h1>SentinelOne SOC Dashboard</h1>
  <div id="generated"></div>
</header>

<div class="container">

  <div class="kpis">

    <div class="kpi">
      <h2 id="kpi_total">0</h2>
      <p>Total Incidents</p>
    </div>

    <div class="kpi">
      <h2 id="kpi_active">0</h2>
      <p>Active Incidents</p>
    </div>

    <div class="kpi">
      <h2 id="kpi_resolved">0</h2>
      <p>Resolved</p>
    </div>

    <div class="kpi">
      <h2 id="kpi_endpoints">0</h2>
      <p>Endpoints Monitored</p>
    </div>

  </div>


  <div class="charts">

    <div class="chart-box">
      <h3>Incidents by Classification</h3>
      <canvas id="classificationChart"></canvas>
    </div>

    <div class="chart-box">
      <h3>Incidents by Status</h3>
      <canvas id="statusChart"></canvas>
    </div>

    <div class="chart-box">
      <h3>Incidents Over Time</h3>
      <canvas id="trendChart"></canvas>
    </div>

    <div class="chart-box">
      <h3>Top Endpoints</h3>
      <canvas id="endpointChart"></canvas>
    </div>

  </div>


  <h3>Recent Incidents</h3>

  <table id="recent_table">
    <thead>
    <tr>
      <th>Time</th>
      <th>Endpoint</th>
      <th>Threat</th>
      <th>Classification</th>
      <th>Severity</th>
      <th>Status</th>
      <th>User</th>
    </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="footer">
    Auto refresh every 30 seconds
  </div>

</div>

<script>

  let classificationChart;
  let statusChart;
  let trendChart;
  let endpointChart;

  async function loadDashboard() {

      const res = await fetch(`sentinel_dashboard_data.json?t=${Date.now()}`);
      const data = await res.json();

      document.getElementById("generated").innerText =
          "Generated: " + data.generated_at;

      document.getElementById("kpi_total").innerText =
          data.summary.total_incidents;

      document.getElementById("kpi_active").innerText =
          data.summary.active_incidents;

      document.getElementById("kpi_resolved").innerText =
          data.summary.resolved_incidents;

      document.getElementById("kpi_endpoints").innerText =
          data.summary.monitored_endpoints;

      renderClassification(data);
      renderStatus(data);
      renderTrend(data);
      renderEndpoints(data);
      renderRecent(data);
  }

  function renderClassification(data) {

      const labels = data.classification_counts.map(x=>x.classification);
      const values = data.classification_counts.map(x=>x.count);

      if(classificationChart) classificationChart.destroy();

      classificationChart = new Chart(
          document.getElementById("classificationChart"),
          {
              type:'pie',
              data:{
                  labels:labels,
                  datasets:[{
                      data:values
                  }]
              }
          }
      );
  }

  function renderStatus(data) {

      const labels = data.status_counts.map(x=>x.status);
      const values = data.status_counts.map(x=>x.count);

      if(statusChart) statusChart.destroy();

      statusChart = new Chart(
          document.getElementById("statusChart"),
          {
              type:'doughnut',
              data:{
                  labels:labels,
                  datasets:[{
                      data:values
                  }]
              }
          }
      );
  }

  function renderTrend(data) {

      const labels = data.incidents_over_time.map(x=>x.date);
      const values = data.incidents_over_time.map(x=>x.count);

      if(trendChart) trendChart.destroy();

      trendChart = new Chart(
          document.getElementById("trendChart"),
          {
              type:'line',
              data:{
                  labels:labels,
                  datasets:[{
                      label:"Incidents",
                      data:values
                  }]
              }
          }
      );
  }

  function renderEndpoints(data) {

      const labels = data.top_endpoints.map(x=>x.agent_name);
      const values = data.top_endpoints.map(x=>x.count);

      if(endpointChart) endpointChart.destroy();

      endpointChart = new Chart(
          document.getElementById("endpointChart"),
          {
              type:'bar',
              data:{
                  labels:labels,
                  datasets:[{
                      label:"Incidents",
                      data:values
                  }]
              }
          }
      );
  }

  function renderRecent(data){

      const tbody = document.querySelector("#recent_table tbody");
      tbody.innerHTML="";

      data.recent_incidents.forEach(r => {

          const tr = document.createElement("tr");

          tr.innerHTML = `
          <td>${r.created_at}</td>
          <td>${r.endpoint}</td>
          <td>${r.threat}</td>
          <td>${r.classification}</td>
          <td>${r.severity}</td>
          <td>${r.status}</td>
          <td>${r.username}</td>
          `;

          tbody.appendChild(tr);
      });
  }

  loadDashboard();

  setInterval(loadDashboard,30000);

</script>

</body>
</html>
